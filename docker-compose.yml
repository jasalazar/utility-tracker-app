version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # Redis — primary datastore + pub/sub bus + APScheduler job store
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: utility-tracker-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --save 60 1
      --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Backend — FastAPI app (also serves the built React SPA)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: utility-tracker-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      # Mount the built frontend so FastAPI can serve it
      - ./frontend/dist:/app/frontend/dist:ro

volumes:
  redis_data:
    driver: local
