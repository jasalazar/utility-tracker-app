services:
  # ---------------------------------------------------------------------------
  # Redis — primary datastore + pub/sub bus + APScheduler job store
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: utility-tracker-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --save 60 1
      --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Backend — FastAPI app (also serves the built React SPA)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: utility-tracker-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      OAUTHLIB_RELAX_TOKEN_SCOPE: "1"   # tolerate granular-consent partial grants (don't 500)
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      # Mount the built frontend so FastAPI can serve it
      - ./frontend/dist:/app/frontend/dist:ro

  # ---------------------------------------------------------------------------
  # MCP server — HTTP + WorkOS AuthKit (multi-user). Sibling of `backend`;
  # reads the same Redis. Reachable from the public internet only via the
  # cloudflared tunnel (no host port published).
  # ---------------------------------------------------------------------------
  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: utility-tracker-mcp
    restart: unless-stopped
    command: python -m backend.mcp_server_http
    env_file:
      - .env                      # provides AUTHKIT_DOMAIN, BASE_URL + app secrets
    environment:
      REDIS_URL: redis://redis:6379/0   # override .env's localhost for the compose network
    depends_on:
      redis:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Cloudflare Tunnel — exposes `backend` and `mcp` to the internet over HTTPS
  # without publishing ports. Routes are configured in the Cloudflare dashboard:
  #   app.utilitytracker.org -> http://backend:8000
  #   mcp.utilitytracker.org -> http://mcp:8787
  # ---------------------------------------------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: utility-tracker-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - backend
      - mcp

volumes:
  redis_data:
    driver: local
